<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-red-800 rounded-lg flex items-center justify-center">
                        <i data-lucide="folder-kanban" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-xl font-bold text-gray-900">ProManage</span>
                </a>
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <a href="/" class="text-gray-600 hover:text-red-800 transition-colors">Home</a>
                <a href="/projects" class="text-gray-600 hover:text-red-800 transition-colors">Projects</a>
                <a href="/submissions" class="text-gray-600 hover:text-red-800 transition-colors">Pengumpulan Tugas</a>
                <a href="/about" class="text-gray-600 hover:text-red-800 transition-colors">About</a>
            </nav>
            <div id="auth-buttons" class="hidden items-center gap-3">
                <button onclick="openLoginModal()" class="text-gray-600 hover:text-red-800 transition-colors font-medium px-4 py-2">Login</button>
                <button onclick="openRegisterModal()" class="bg-red-800 hover:bg-red-900 text-white px-4 py-2 rounded-lg font-medium transition-colors">Register</button>
            </div>
            <div id="user-display" class="hidden items-center gap-3">
                <div class="relative">
                    <button onclick="toggleUserMenu()" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
                        <div class="w-8 h-8 rounded-full overflow-hidden flex items-center justify-center bg-red-800">
                            <img id="header-avatar-img" src="" alt="Profile" class="w-full h-full object-cover hidden">
                            <i id="header-avatar-icon" data-lucide="user" class="w-4 h-4 text-white"></i>
                        </div>
                        <div class="text-left hidden lg:block">
                            <p id="user-name" class="text-sm font-medium text-gray-900">User Name</p>
                            <p id="user-email" class="text-xs text-gray-500">user@email.com</p>
                        </div>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-gray-600"></i>
                    </button>
                    <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                        <a href="/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"><i data-lucide="user" class="w-4 h-4 inline mr-2"></i>Profil Saya</a>
                        <a href="/projects" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"><i data-lucide="folder-kanban" class="w-4 h-4 inline mr-2"></i>My Projects</a>
                        <hr class="my-1">
                        <button onclick="logout()" class="w-full text-left block px-4 py-2 text-sm text-red-600 hover:bg-gray-100"><i data-lucide="log-out" class="w-4 h-4 inline mr-2"></i>Logout</button>
                    </div>
                </div>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden p-2 rounded-lg hover:bg-gray-100"><i data-lucide="menu" class="w-6 h-6 text-gray-600"></i></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden pb-4">
            <nav class="flex flex-col gap-2">
                <a href="/" class="px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">Home</a>
                <a href="/projects" class="px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">Projects</a>
                <a href="/submissions" class="px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">Pengumpulan Tugas</a>
                <a href="/about" class="px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">About</a>
                <div id="mobile-auth-buttons" class="hidden flex-col gap-2 mt-2 pt-2 border-t border-gray-200">
                    <button onclick="openLoginModal()" class="px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors text-left">Login</button>
                    <button onclick="openRegisterModal()" class="px-3 py-2 bg-red-800 hover:bg-red-900 text-white rounded-lg transition-colors">Register</button>
                </div>
                <div id="mobile-user-display" class="hidden flex-col gap-2 mt-2 pt-2 border-t border-gray-200">
                    <a href="/profile" class="px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors"><i data-lucide="user" class="w-4 h-4 inline mr-2"></i>Profil Saya</a>
                    <a href="/projects" class="px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors"><i data-lucide="folder-kanban" class="w-4 h-4 inline mr-2"></i>My Projects</a>
                    <button onclick="logout()" class="px-3 py-2 text-red-600 hover:bg-gray-100 rounded-lg transition-colors text-left"><i data-lucide="log-out" class="w-4 h-4 inline mr-2"></i>Logout</button>
                </div>
            </nav>
        </div>
    </div>
</header>
<script>
    function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); lucide.createIcons(); }
    function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('hidden'); }
    function updateMobileMenu() {
        const user = getCurrentUser();
        const mobileAuthButtons = document.getElementById('mobile-auth-buttons');
        const mobileUserDisplay = document.getElementById('mobile-user-display');
        if (user) {
            if (mobileAuthButtons) {
                mobileAuthButtons.classList.add('hidden');
                mobileAuthButtons.classList.remove('flex');
            }
            if (mobileUserDisplay) {
                mobileUserDisplay.classList.remove('hidden');
                mobileUserDisplay.classList.add('flex');
            }
        } else {
            if (mobileAuthButtons) {
                mobileAuthButtons.classList.remove('hidden');
                mobileAuthButtons.classList.add('flex');
            }
            if (mobileUserDisplay) {
                mobileUserDisplay.classList.add('hidden');
                mobileUserDisplay.classList.remove('flex');
            }
        }
    }
    document.addEventListener('click', function(event) { const userMenu = document.getElementById('user-menu'); const userButton = event.target.closest('button[onclick="toggleUserMenu()"]'); if (!userButton && userMenu && !userMenu.classList.contains('hidden')) { userMenu.classList.add('hidden'); } });
    document.addEventListener('DOMContentLoaded', updateMobileMenu);
</script>
