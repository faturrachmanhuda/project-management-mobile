<!-- Modal Tambah Pekerjaan -->
<div id="add-work-modal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="modal-backdrop fixed inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal('add-work-modal')"></div>
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="relative bg-white rounded-2xl shadow-2xl max-w-2xl w-full overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                    <i data-lucide="briefcase" class="w-5 h-5 text-red-800"></i>
                    Tambah Pekerjaan Baru
                </h3>
                <button type="button" onclick="closeModal('add-work-modal')" class="text-gray-400 hover:text-gray-600 transition-colors p-1.5 rounded-lg hover:bg-gray-100">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form class="p-8 space-y-4" onsubmit="handleWorkSubmit(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><label class="block text-sm font-bold text-gray-700 mb-1">Nama Pekerjaan
                            *</label><input type="text" id="new-work-name" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent text-sm transition-all focus:ring-2 focus:ring-red-800">
                    </div>
                    <div class="col-span-2"><label class="block text-sm font-bold text-gray-700 mb-1">Deskripsi
                            *</label><textarea id="new-work-description" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent text-sm transition-all focus:ring-2 focus:ring-red-800"></textarea>
                    </div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Tempat *</label><input type="text"
                            id="new-work-location" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent text-sm transition-all">
                    </div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Mulai</label><input type="date"
                            id="new-work-start" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent text-sm transition-all"></div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Selesai</label><input type="date"
                            id="new-work-end" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent text-sm transition-all"></div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Pelaksana</label><input type="text"
                            id="new-work-executor" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent text-sm transition-all">
                    </div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Supervisor</label><input type="text"
                            id="new-work-supervisor" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent text-sm transition-all">
                    </div>
                </div>
                <div class="flex gap-4 pt-4"><button type="button" onclick="closeModal('add-work-modal')"
                        class="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 text-sm">Batal</button><button type="submit"
                        class="flex-1 px-4 py-2.5 bg-red-800 text-white rounded-lg font-medium hover:bg-red-900 transition-colors flex items-center justify-center gap-2 text-sm">Simpan</button></div>
            </form>
        </div>
    </div>
</div>
