<div id="auth-modal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="modal-backdrop fixed inset-0" onclick="closeAuthModal()"></div>
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="relative bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 md:p-8">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="flex gap-4 mb-6 border-b border-gray-200">
                <button id="login-tab" onclick="switchTab('login')" class="pb-3 px-1 font-semibold text-red-800 border-b-2 border-red-800">Login</button>
                <button id="register-tab" onclick="switchTab('register')" class="pb-3 px-1 font-semibold text-gray-400">Register</button>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">Selamat Datang Kembali</h2>
                <div class="space-y-4">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="login-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent" placeholder="email@example.com"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Password</label><input type="password" id="login-password" required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent" placeholder="••••••••"></div>
                </div>
                <button type="submit" class="w-full mt-6 bg-red-800 hover:bg-red-900 text-white py-3 rounded-lg font-medium transition-colors">Login</button>
            </form>
            <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">Buat Akun Baru</h2>
                <div class="space-y-4">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label><input type="text" id="register-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent" placeholder="John Doe"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">NIM</label><input type="text" id="register-nim" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent" placeholder="123456789"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="register-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent" placeholder="email@example.com"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Password</label><input type="password" id="register-password" required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent" placeholder="••••••••"></div>
                </div>
                <button type="submit" class="w-full mt-6 bg-red-800 hover:bg-red-900 text-white py-3 rounded-lg font-medium transition-colors">Register</button>
            </form>
        </div>
    </div>
</div>
<script>
    function openLoginModal() { document.getElementById('auth-modal').classList.remove('hidden'); switchTab('login'); lucide.createIcons(); }
    function openRegisterModal() { document.getElementById('auth-modal').classList.remove('hidden'); switchTab('register'); lucide.createIcons(); }
    function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }
    function switchTab(tab) { const loginTab = document.getElementById('login-tab'); const registerTab = document.getElementById('register-tab'); const loginForm = document.getElementById('login-form'); const registerForm = document.getElementById('register-form'); if (tab === 'login') { loginTab.classList.add('text-red-800', 'border-b-2', 'border-red-800'); loginTab.classList.remove('text-gray-400'); registerTab.classList.remove('text-red-800', 'border-b-2', 'border-red-800'); registerTab.classList.add('text-gray-400'); loginForm.classList.remove('hidden'); registerForm.classList.add('hidden'); } else { registerTab.classList.add('text-red-800', 'border-b-2', 'border-red-800'); registerTab.classList.remove('text-gray-400'); loginTab.classList.remove('text-red-800', 'border-b-2', 'border-red-800'); loginTab.classList.add('text-gray-400'); registerForm.classList.remove('hidden'); loginForm.classList.add('hidden'); } }
    async function handleLogin(event) { event.preventDefault(); const email = document.getElementById('login-email').value; const password = document.getElementById('login-password').value; try { const response = await fetch('/api/auth/login/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) }); const data = await response.json(); if (data.success) { localStorage.setItem('auth_token', data.token); localStorage.setItem('user_data', JSON.stringify(data.user)); localStorage.setItem('user_name', data.user.name); showToast('Login berhasil! Selamat datang.', 'success'); closeAuthModal(); setTimeout(() => { window.location.href = '/projects'; }, 1000); } else { showToast(data.error || 'Login gagal. Periksa email dan password Anda.', 'error'); } } catch (error) { showToast('Terjadi kesalahan. Silakan coba lagi.', 'error'); } }
    async function handleRegister(event) { event.preventDefault(); const name = document.getElementById('register-name').value; const nim = document.getElementById('register-nim').value; const email = document.getElementById('register-email').value; const password = document.getElementById('register-password').value; try { const response = await fetch('/api/auth/register/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, nim, email, password }) }); const data = await response.json(); if (data.success) { localStorage.setItem('auth_token', data.token); localStorage.setItem('user_data', JSON.stringify(data.user)); localStorage.setItem('user_name', data.user.name); showToast('Pendaftaran berhasil! Selamat datang.', 'success'); closeAuthModal(); setTimeout(() => { window.location.href = '/projects'; }, 1000); } else { showToast(data.error || 'Pendaftaran gagal. Silakan coba lagi.', 'error'); } } catch (error) { showToast('Terjadi kesalahan. Silakan coba lagi.', 'error'); } }
</script>
