<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ProManage - Aplikasi Manajemen Proyek Mahasiswa{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#B91C1C' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Very light slate for modern feel */
            color: #0f172a;
        }

        .toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .toast {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 1rem;
            padding: 1rem 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toast-error { border-left: 4px solid #ef4444; }
        .toast-info { border-left: 4px solid #3b82f6; }
        .toast-success { border-left: 4px solid #22c55e; }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal-backdrop {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
        }

        {% block extra_css %}{% endblock %}
    </style>
    <link rel="stylesheet" href="/static/css/custom.css">
</head>

<body class="bg-white">
    <div id="toast-container" class="toast-container"></div>
    {% include 'components/header.html' %}
    <main>{% block content %}{% endblock %}</main>
    {% block modals %}{% endblock %}
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isError = type === 'error';
            const isInfo = type === 'info';

            toast.className = `toast ${isError ? 'toast-error' : isInfo ? 'toast-info' : ''}`;

            const icon = isError ? 'alert-circle' : isInfo ? 'info' : 'check-circle';
            const iconColor = isError ? 'text-red-600' : isInfo ? 'text-blue-600' : 'text-green-600';

            toast.innerHTML = `
                <div class="${iconColor} shrink-0">
                    <i data-lucide="${icon}" class="w-6 h-6"></i>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-gray-900 leading-tight">${message}</p>
                </div>
                <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            `;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                toast.style.transition = 'all 0.3s ease-in';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }
        function isAuthenticated() { return localStorage.getItem('auth_token') !== null; }
        function getAuthToken() { return localStorage.getItem('auth_token'); }
        function getCurrentUser() { const userData = localStorage.getItem('user_data'); return userData ? JSON.parse(userData) : null; }
        function logout() { localStorage.removeItem('auth_token'); localStorage.removeItem('user_data'); window.location.href = '/'; }

        async function apiRequest(endpoint, options = {}) {
            const token = getAuthToken();
            const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}), ...options.headers };
            try {
                const response = await fetch(`/api${endpoint}`, { ...options, headers });
                if (response.status === 401) { logout(); throw new Error('Session expired'); }
                return response;
            } catch (error) {
                console.error('API Request Error:', error);
                throw error;
            }
        }

        function updateHeaderUser() {
            const user = getCurrentUser();
            const userDisplay = document.getElementById('user-display');
            const authButtons = document.getElementById('auth-buttons');
            if (user) {
                if (userDisplay) userDisplay.classList.add('md:flex');
                if (authButtons) authButtons.classList.remove('md:flex');

                const userName = document.getElementById('user-name');
                const userEmail = document.getElementById('user-email');
                if (userName) userName.textContent = user.name;
                if (userEmail) userEmail.textContent = user.email;

                const headerAvatarImg = document.getElementById('header-avatar-img');
                const headerAvatarIcon = document.getElementById('header-avatar-icon');
                if (headerAvatarImg && headerAvatarIcon) {
                    if (user.profile_picture_url) {
                        headerAvatarImg.src = user.profile_picture_url;
                        headerAvatarImg.classList.remove('hidden');
                        headerAvatarIcon.classList.add('hidden');
                    } else {
                        headerAvatarImg.classList.add('hidden');
                        headerAvatarIcon.classList.remove('hidden');
                    }
                }
            } else {
                if (userDisplay) userDisplay.classList.remove('md:flex');
                if (authButtons) authButtons.classList.add('md:flex');
            }
        }
        document.addEventListener('DOMContentLoaded', function () { updateHeaderUser(); lucide.createIcons(); });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
