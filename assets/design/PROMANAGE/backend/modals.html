<!-- Modal Tambah Pekerjaan -->
<div id="add-work-modal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="modal-backdrop fixed inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal('add-work-modal')"></div>
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="relative bg-white rounded-2xl shadow-2xl max-w-2xl w-full overflow-hidden">
            <div class="px-8 py-6 border-b border-gray-100">
                <h3 class="text-2xl font-bold text-gray-900">Tambah Pekerjaan Baru</h3>
            </div>
            <form class="p-8 space-y-4" onsubmit="handleWorkSubmit(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><label class="block text-sm font-bold text-gray-700 mb-1">Nama Pekerjaan
                            *</label><input type="text" id="new-work-name" required
                            class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-red-800">
                    </div>
                    <div class="col-span-2"><label class="block text-sm font-bold text-gray-700 mb-1">Deskripsi
                            *</label><textarea id="new-work-description" required
                            class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-red-800"></textarea>
                    </div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Tempat *</label><input type="text"
                            id="new-work-location" required class="w-full px-4 py-2 border rounded-lg outline-none">
                    </div>
                    <div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Mulai</label><input type="date"
                            id="new-work-start" required class="w-full px-4 py-2 border rounded-lg outline-none"></div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Selesai</label><input type="date"
                            id="new-work-end" required class="w-full px-4 py-2 border rounded-lg outline-none"></div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Pelaksana</label><input type="text"
                            id="new-work-executor" required class="w-full px-4 py-2 border rounded-lg outline-none">
                    </div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Supervisor</label><input type="text"
                            id="new-work-supervisor" required class="w-full px-4 py-2 border rounded-lg outline-none">
                    </div>
                </div>
                <div class="flex gap-4 pt-4"><button type="button" onclick="closeModal('add-work-modal')"
                        class="flex-1 px-6 py-3 border rounded-lg font-bold">Batal</button><button type="submit"
                        class="flex-1 px-6 py-3 bg-red-800 text-white rounded-lg font-bold">Simpan</button></div>
            </form>
        </div>
    </div>
</div>
